<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mundial 2026</title>
  <meta name="theme-color" content="#0C447C">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="pantalla-carga">
    <div class="spinner"></div>
    <p>Cargando fixture...</p>
  </div>

  <div id="app" class="oculto">

    <header class="app-header">
      <div>
        <p class="eyebrow eyebrow-marca">Tesoro Eventos presenta</p>
        <h1 id="titulo-torneo">Mundial 2026</h1>
      </div>
      <span class="icono-balon" aria-hidden="true">⚽</span>
    </header>

    <main id="contenido">

      <section id="vista-inicio" class="vista vista-activa">
        <div id="bloque-en-vivo"></div>

        <h2>Próximos partidos</h2>
        <div id="proximos-partidos" class="lista-partidos"></div>

        <h2>Resultados recientes</h2>
        <div id="resultados-recientes" class="lista-partidos"></div>
      </section>

      <section id="vista-calendario" class="vista">
        <h2>Calendario</h2>
        <select id="selector-calendario" class="selector-grupo" aria-label="Filtrar partidos"></select>
        <div id="lista-calendario"></div>
      </section>

      <section id="vista-grupos" class="vista">
        <h2>Tabla de grupos</h2>
        <select id="selector-grupo" class="selector-grupo" aria-label="Elegir grupo"></select>
        <div id="tabla-grupo"></div>
        <p class="leyenda">
          <span class="punto punto-clasifica"></span> Clasifica directo (1° y 2°)
          <span class="punto punto-tercero"></span> Puede clasificar como mejor tercero
        </p>
      </section>

      <section id="vista-llaves" class="vista">
        <h2>Llaves eliminatorias</h2>
        <select id="selector-ronda" class="selector-grupo" aria-label="Elegir ronda"></select>
        <div id="lista-llaves"></div>
      </section>

      <section id="vista-stats" class="vista">
        <h2>Estadísticas</h2>
        <p class="placeholder">Próximamente: goleadores, promedios y más.</p>
      </section>

    </main>

    <nav class="nav-inferior">
      <button class="nav-item nav-activo" data-vista="inicio" aria-label="Inicio">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Inicio</span>
      </button>
      <button class="nav-item" data-vista="calendario" aria-label="Calendario">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/><path d="M8 2v4"/><path d="M16 2v4"/></svg>
        <span>Calendario</span>
      </button>
      <button class="nav-item" data-vista="grupos" aria-label="Grupos">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>
        <span>Grupos</span>
      </button>
      <button class="nav-item" data-vista="llaves" aria-label="Llaves">
        <svg viewBox="0 0 24 24"><path d="M4 4h4v6a4 4 0 0 0 8 0V4h4"/><path d="M12 14v4"/><path d="M8 22h8"/><path d="M10 22v-4h4v4"/></svg>
        <span>Llaves</span>
      </button>
      <button class="nav-item" data-vista="stats" aria-label="Estadísticas">
        <svg viewBox="0 0 24 24"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-7"/></svg>
        <span>Stats</span>
      </button>
    </nav>

  </div>

  <script src="js/config.js"></script>
  <script src="js/datos-ejemplo.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
